<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dusty Chisel</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    /* Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Montserrat', sans-serif;
    }

    /* Top Navigation Bar */
    .navbar {
      position: fixed;              /* keeps it always at top */
      top: 0;
      width: 100%;
      background: #e6e1dc;          /* light beige like design */
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 40px;
      z-index: 1000;                /* keeps it above everything */
    }

    .logo {
      font-weight: 600;
      font-size: 1.5rem;
      color: #8b5e3c;
    }

    .nav-links a {
      margin-left: 30px;
      text-decoration: none;
      color: #333;
      font-weight: 500;
    }

    /* Hero Section */
    .hero {
      height: 100vh;                 /* full screen */
      background-size: cover;        /* fill screen */
      background-position: center;   /* center image */
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      transition: background-image 0.5s ease-in-out; /* smooth change */
    }

    /* Overlay for readability */
    .hero::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.3); /* dark overlay */
    }

    .hero-content {
      position: relative;           /* sits above overlay */
      color: #f5e6c8;
      max-width: 800px;
    }

    .hero-content h1 {
      font-size: 3.5rem;
      margin-bottom: 20px;
    }

    .hero-content p {
      font-size: 1.5rem;
      margin-bottom: 40px;
      letter-spacing: 2px;
    }

    /* Slider dots */
    .dots {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 15px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(255,255,255,0.6);
      cursor: pointer;
      transition: 0.3s;
    }

    .dot.active {
      background: white; /* highlight active */
    }

  </style>
</head>
<body>

  <!-- Navigation -->
  <div class="navbar">
    <div class="logo">Dusty Chisel</div>
    <div class="nav-links">
      <a href="#">About us</a>
      <a href="#">Products</a>
      <a href="#">Contact</a>
      <a href="#">Gallery</a>
    </div>
  </div>

  <!-- Hero Section -->
  <section class="hero" id="hero">
    <div class="hero-content">
      <h1>Proudly handmade in New Zealand</h1>
      <p>Premium Quality, made to last</p>
      <p>Giving wood life once more</p>
    </div>

    <!-- Dots -->
    <div class="dots">
      <div class="dot active" onclick="changeSlide(0)"></div>
      <div class="dot" onclick="changeSlide(1)"></div>
      <div class="dot" onclick="changeSlide(2)"></div>
    </div>
  </section>

  <script>
    // Image list (replace with your actual images)
    const images = [
      'images1/image1.jpg',
      'images1/image2.jpg',
      'images1/image3.jpg'
    ];

    const hero = document.getElementById('hero');
    const dots = document.querySelectorAll('.dot');

    function changeSlide(index) {
      // change background image
      hero.style.backgroundImage = `url(${images[index]})`;

      // update active dot
      dots.forEach(dot => dot.classList.remove('active'));
      dots[index].classList.add('active');
    }

    // set default image
    changeSlide(0);
  </script>

</body>
</html>
