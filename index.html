<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dusty Chisel</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    /* Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Montserrat', sans-serif;
    }

    /* Top Navigation Bar */
    .navbar {
      position: fixed;              /* keeps it always at top */
      top: 0;
      width: 100%;
      background: #e6e1dc;          /* light beige like design */
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 40px;
      z-index: 1000;                /* keeps it above everything */
    }

    .logo {
      font-weight: 600;
      font-size: 1.5rem;
      color: #8b5e3c;
    }

    .nav-links a {
      margin-left: 30px;
      text-decoration: none;
      color: #333;
      font-weight: 500;
    }

    /* Hero Section */
    .hero {
      height: 100vh;                 /* full screen */
      background-size: cover;        /* fill screen */
      background-position: center;   /* center image */
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      transition: background-image 0.5s ease-in-out; /* smooth change */
    }

    /* Overlay for readability */
    .hero::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.3); /* dark overlay */
    }

    .hero-content {
      position: relative;           /* sits above overlay */
      color: #f5e6c8;
      max-width: 800px;
    }

    .hero-content h1 {
      font-size: 3.5rem;
      margin-bottom: 20px;
    }

    .hero-content p {
      font-size: 1.5rem;
      margin-bottom: 40px;
      letter-spacing: 2px;
    }

    /* Slider dots */
    .dots {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 15px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(255,255,255,0.6);
      cursor: pointer;
      transition: 0.3s;
    }

    .dot.active {
      background: white; /* highlight active */
    }

  </style>
</head>
<body>

  <!-- Navigation -->
  <div class="navbar">
    <div class="logo">Dusty Chisel</div>
    <div class="nav-links">
      <a href="#">About us</a>
      <a href="#">Products</a>
      <a href="#">Contact</a>
      <a href="#">Gallery</a>
    </div>
  </div>

  <!-- Hero Section -->
  <section class="hero" id="hero">
    <div class="hero-content">
      <h1>Proudly handmade in New Zealand</h1>
      <p>Premium Quality, made to last</p>
      <p>Giving wood life once more</p>
    </div>

    <!-- Dots -->
    <div class="dots">
      <div class="dot active" onclick="changeSlide(0)"></div>
      <div class="dot" onclick="changeSlide(1)"></div>
      <div class="dot" onclick="changeSlide(2)"></div>
    </div>
  </section>

  <script>
    // Image list (replace with your actual images)
    const images = [
      'assets/image1.jpg',
      'assets/image2.jpg',
      'assets/image3.jpg'
    ];

    const hero = document.getElementById('hero');
    const dots = document.querySelectorAll('.dot');

    function changeSlide(index) {
      // change background image
      hero.style.backgroundImage = `url(${images[index]})`;

      // update active dot
      dots.forEach(dot => dot.classList.remove('active'));
      dots[index].classList.add('active');
    }

    // set default image
    changeSlide(0);
  </script>

  <!-- Products Section -->
  <section class="products-page">

    <!-- Category Tabs -->
    <div class="categories">
      <span>All</span>
      <span>Chopping Boards</span>
      <span>Pizza Board</span>
      <span>Something</span>
    </div>

    <!-- Product Grid -->
    <div class="products-grid">

      <!-- Product Item -->
      <div class="product-card">
        <div class="product-image"></div> <!-- controls image size -->
        <div class="product-info">
          <p>Product Name - $Price</p> <!-- editable text -->
        </div>
      </div>

      <div class="product-card">
        <div class="product-image"></div>
        <div class="product-info">
          <p>Product Name - $Price</p>
        </div>
      </div>

      <div class="product-card">
        <div class="product-image"></div>
        <img src="assets/placeholder.jpg" class="product-image">
        <div class="product-info">
          <p>Product Name - $Price</p>
        </div>
      </div>

      <div class="product-card">
        <div class="product-image"></div>
        <div class="product-info">
          <p>Product Name - $Price</p>
        </div>
      </div>

    </div>
  </section>

  <style>

    /* Products Page Background */
    .products-page {
      background: #d6c08a; /* overall background colour */
      padding: 120px 40px; /* top space avoids navbar overlap */
    }

    /* Category Navigation */
    .categories {
      display: flex;
      justify-content: center; /* centers categories horizontally */
      gap: 80px; /* spacing between category items */
      font-size: 1.8rem; /* size of category text */
      margin-bottom: 50px; /* space between categories and grid */
    }

    /* Product Grid Layout */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr); /* 4 columns layout */
      gap: 50px; /* space between products */
      justify-items: center; /* centers items inside grid */
    }

    /* Individual Product Card */
    .product-card {
      width: 100%;
      max-width: 250px; /* controls card width */
      text-align: center;
    }

    /* Placeholder Image Box */
    .product-image {
      width: 100%;
      height: 200px; /* controls image height */
      background: #8b5e3c; /* brown placeholder */
      margin-bottom: 15px; /* space between image and text */
    }

    /* Product Info Box */
    .product-info {
      background: #f3e4c4; /* light box behind text */
      padding: 10px; /* space inside text box */
      font-size: 1rem; /* text size */
    }

    /* Responsive Adjustments */
    @media (max-width: 1000px) {
      .products-grid {
        grid-template-columns: repeat(2, 1fr); /* 2 columns on tablet */
      }
    }

    @media (max-width: 600px) {
      .products-grid {
        grid-template-columns: 1fr; /* 1 column on mobile */
      }
    }

  </style>

</body>
</html>
